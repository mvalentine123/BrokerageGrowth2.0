name: Build and Deploy Next.js App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.deploy-tag.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set deploy image tag
        id: deploy-tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/${{ github.event.repository.default_branch }}" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      # Configure Kubernetes authentication (choose one and add secrets):
      # - GKE: google-github-actions/auth with credentials and then get-credentials
      # - EKS: aws-actions/amazon-eks-get-cluster-credentials
      # - Generic: create kubeconfig from secret (e.g. KUBE_CONFIG_DATA)
      - name: Set up kubeconfig (placeholder)
        run: |
          echo "Configure cluster access: set KUBE_CONFIG_DATA or use a provider action (GKE/EKS/AKS)."
          if [ -n "${{ secrets.KUBE_CONFIG_DATA }}" ]; then
            mkdir -p "$HOME/.kube"
            echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > "$HOME/.kube/config"
            chmod 600 "$HOME/.kube/config"
          fi

      - name: Install or upgrade Helm release
        run: |
          helm upgrade --install nextjs-app ./charts/nextjs-app \
            --namespace default \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.build-and-push-image.outputs.image_tag }} \
            --set image.pullPolicy=IfNotPresent \
            --wait --timeout 5m

      - name: Optional – trigger Argo CD sync
        run: |
          echo "If using Argo CD, ensure the Application tracks this repo; image updates may require sync or image updater."
